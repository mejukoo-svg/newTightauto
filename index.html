<script>
const SB_URL='https://qkvqiorazdrhtuicnpec.supabase.co';
const SB_KEY='sb_publishable_43NkUJjcYzcBUiJhnKVHXw_eWTuZU2g';
const H={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};

// Highlight config: class name + percentage
const HL_CONFIG={
  'up20':{cls:'hl-up20',pct:20,label:'+20%'},
  'up10':{cls:'hl-up10',pct:10,label:'+10%'},
  'down10':{cls:'hl-down10',pct:-10,label:'-10%'},
  'down20':{cls:'hl-down20',pct:-20,label:'-20%'},
  'off':{cls:'hl-off',pct:null,label:'OFF'},
  'watch':{cls:'hl-watch',pct:0,label:'주의'},
};

async function sb(t,q=''){const r=await fetch(SB_URL+'/rest/v1/'+t+'?'+q,{headers:H});return r.json()}
async function sbAll(t){let p=0,a=[];while(true){const r=await sb(t,'select=*&order=date.desc,spend.desc&limit=1000&offset='+p*1000);a=a.concat(r);if(r.length<1000)break;p++}return a}

const F=n=>n==null?'':Math.round(n).toLocaleString('ko-KR');
const W=n=>n==null||n===0?'':'₩'+F(n);
const P=(n,d)=>n==null?'':n.toFixed(d||1)+'%';
const WD=d=>['일','월','화','수','목','금','토'][new Date(d).getDay()];
const WM=d=>{const x=new Date(d),dd=x.getDay(),df=x.getDate()-dd+(dd===0?-6:1);return new Date(x.setDate(df)).toISOString().split('T')[0]};
const DK=d=>{const p=d.split('-');return p[0].slice(2)+'/'+p[1]+'/'+p[2]};

function RC(r){if(r>=300)return'bg-r300';if(r>=200)return'bg-r200';if(r>=100)return'bg-r100';if(r>0)return'bg-r50';return'bg-r0'}

function MC(roas,profit,spend,revenue,cvr){
if(!spend)return'';
const pc=profit>=0?'p':'p neg';
return'<div class="r">'+roas.toFixed(0)+'</div><div class="'+pc+'">'+W(profit)+'</div><div class="s">-'+W(spend)+'</div><div class="rv">'+W(revenue)+'</div><div class="cv">'+P(cvr)+'</div>';
}
function MCC(roas,chg,spend,revenue,cvr){
if(!spend)return'';
const cc=chg>0?'ch pos':(chg<0?'ch neg':'ch');
const sg=chg>0?'+':'';
return'<div class="r">'+roas.toFixed(0)+'</div><div class="'+cc+'">'+sg+chg.toFixed(1)+'%</div><div class="s">-'+W(spend)+'</div><div class="rv">'+W(revenue)+'</div><div class="cv">'+P(cvr)+'</div>';
}

let AD=[],DATES=[],DAILY={},PRODS=[],HIGHLIGHTS={};

async function loadHighlights(){
try{
const r=await sb('adset_highlights','select=*');
HIGHLIGHTS={};
r.forEach(x=>{HIGHLIGHTS[x.adset_id]=x.highlight});
}catch(e){console.error('highlight load err',e)}
}

async function saveHighlight(adsetId,highlight){
try{
const body={adset_id:adsetId,highlight:highlight||null,updated_at:new Date().toISOString()};
const resp=await fetch(SB_URL+'/rest/v1/adset_highlights',{method:'POST',headers:{...H,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'},body:JSON.stringify(body)});
if(resp.ok){HIGHLIGHTS[adsetId]=highlight||null;return true}
console.error('highlight save fail',resp.status,await resp.text());
return false;
}catch(e){console.error('highlight save err',e);return false}
}

async function saveMemo(date,adsetId,memo,el){
try{
const url=SB_URL+'/rest/v1/ad_performance_daily?date=eq.'+date+'&adset_id=eq.'+adsetId;
const resp=await fetch(url,{method:'PATCH',headers:{...H,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({memo:memo})});
if(resp.ok){
const ind=el.parentNode.querySelector('.memo-saved');
if(ind){ind.classList.add('show');setTimeout(()=>ind.classList.remove('show'),1500)}
const rec=AD.find(r=>r.date===date&&r.adset_id===adsetId);
if(rec)rec.memo=memo;
}else{console.error('memo save',resp.status)}
}catch(e){console.error('memo err',e)}
}

async function init(){
document.querySelectorAll('.panel').forEach(p=>{p.innerHTML='<div style="padding:40px;text-align:center;color:#999">Supabase 데이터 로딩 중...</div>'});
await Promise.all([loadHighlights(),(async()=>{AD=await sbAll('ad_performance_daily')})()]);
const bd={};
AD.forEach(r=>{if(!bd[r.date])bd[r.date]={s:0,r:0,p:0,mp:0,uc:0,n:0};bd[r.date].s+=r.spend;bd[r.date].r+=r.revenue;bd[r.date].p+=r.profit;bd[r.date].mp+=r.results_mp;bd[r.date].uc+=r.unique_clicks;bd[r.date].n++});
DAILY=bd;DATES=Object.keys(bd).sort().reverse();
const bp={};AD.forEach(r=>{if(!bp[r.product])bp[r.product]=0;bp[r.product]+=r.spend});
PRODS=Object.keys(bp).sort((a,b)=>bp[b]-bp[a]);
document.getElementById('p-trend').innerHTML='<div class="filter"><label>최근</label><select id="tDays"><option value="14">14일</option><option value="30" selected>30일</option><option value="60">60일</option></select><span style="color:#888;margin-left:12px">💡 캠페인/세트/ID 클릭해서 하이라이트 설정</span></div><div class="sheet-wrap"><table id="tTbl"></table></div>';
document.getElementById('p-product').innerHTML='<div class="filter"><label>상품 선택</label><select id="pSel"><option value="">(상품을 선택하세요)</option></select></div><div class="sheet-wrap"><table id="pTbl"></table></div>';
document.getElementById('p-change').innerHTML='<div class="sheet-wrap"><table id="cTbl"></table></div>';
document.getElementById('p-weekly').innerHTML='<div class="filter"><label>보기</label><select id="wMode"><option value="all" selected>전체 (월+주)</option><option value="month">월별만</option><option value="week">주별만</option></select></div><div id="wBlocks" style="max-height:calc(100vh - 90px);overflow:auto"></div>';
document.getElementById('p-weekly2').innerHTML='<div class="sheet-wrap"><table id="w2Tbl"></table></div>';
document.getElementById('p-weekly3').innerHTML='<div class="sheet-wrap"><table id="w3Tbl"></table></div>';
document.getElementById('p-budget').innerHTML='<div class="sheet-wrap"><table class="budget-table" id="bTbl"></table></div>';
document.getElementById('p-datetab').innerHTML='<div class="filter"><label>날짜</label><select id="dtSel"></select></div><div class="sheet-wrap"><table id="dtTbl"></table></div>';
document.getElementById('p-dashboard').innerHTML='<div id="dashContent" style="padding:16px"></div>';

let dashState={dateA:null,dateB:null,metric:'profit'};

function aggregateDay(date){
const rows=AD.filter(r=>r.date===date);
const s=rows.reduce((a,b)=>a+b.spend,0);
const r=rows.reduce((a,b)=>a+b.revenue,0);
const p=r-s;
const mp=rows.reduce((a,b)=>a+b.results_mp,0);
const uc=rows.reduce((a,b)=>a+b.unique_clicks,0);
const imp=rows.reduce((a,b)=>a+(b.impressions||0),0);
const cpm=imp>0?s/imp*1000:0;
return{s,r,p,mp,uc,imp,cpm,roas:s>0?r/s*100:0,cvr:uc>0&&mp>0?mp/uc*100:0,rows};
}

function diffPct(a,b){
if(!b||b===0)return null;
return (a-b)/Math.abs(b)*100;
}

function fmtDiff(diff,isPercent){
if(diff==null)return '<span style="color:#999">—</span>';
const sign=diff>0?'▲':(diff<0?'▼':'');
const color=diff>0?'#16a34a':(diff<0?'#dc2626':'#999');
return '<span style="color:'+color+';font-weight:600">'+sign+' '+Math.abs(diff).toFixed(1)+'%'+'</span>';
}

function aggByProduct(rows){
const by={};
rows.forEach(r=>{
if(!by[r.product])by[r.product]={product:r.product,spend:0,revenue:0,profit:0,mp:0,uc:0};
by[r.product].spend+=r.spend;by[r.product].revenue+=r.revenue;by[r.product].profit+=r.profit;
by[r.product].mp+=r.results_mp;by[r.product].uc+=r.unique_clicks;
});
return Object.values(by).filter(x=>x.spend>0);
}

const BRAND_COLORS=['#4285f4','#ea4335','#fbbc04','#34a853','#9c27b0','#ff6d01','#00acc1','#e91e63','#795548','#607d8b','#f59e0b','#10b981','#6366f1','#ef4444','#14b8a6'];

function drawPieChart(canvasId,data){
const agg=aggByProduct(data.rows).sort((a,b)=>b.spend-a.spend).slice(0,10);
const labels=agg.map(x=>x.product);
const values=agg.map(x=>x.spend);
if(dashCharts[canvasId])dashCharts[canvasId].destroy();
const ctx=document.getElementById(canvasId);
if(!ctx)return;
dashCharts[canvasId]=new Chart(ctx,{type:'doughnut',data:{labels,datasets:[{data:values,backgroundColor:BRAND_COLORS,borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:10},padding:6,boxWidth:12}},tooltip:{callbacks:{label:ctx=>{const v=ctx.parsed;const t=values.reduce((a,b)=>a+b,0);return ctx.label+': '+W(v)+' ('+(v/t*100).toFixed(1)+'%)'}}}}}});
}

function drawBarChart(A,B){
const metric=dashState.metric;
const aggA=aggByProduct(A.rows);
const aggB=aggByProduct(B.rows);
// 두 날짜에 등장한 모든 상품
const allProducts=new Set([...aggA.map(x=>x.product),...aggB.map(x=>x.product)]);
const mapA={};aggA.forEach(x=>{mapA[x.product]=x});
const mapB={};aggB.forEach(x=>{mapB[x.product]=x});
const products=[...allProducts];
// Value extractor
const getVal=(p,side)=>{
const m=side==='A'?mapA[p]:mapB[p];
if(!m)return 0;
if(metric==='profit')return m.profit;
if(metric==='spend')return m.spend;
if(metric==='revenue')return m.revenue;
if(metric==='roas')return m.spend>0?m.revenue/m.spend*100:0;
if(metric==='cvr')return m.uc>0&&m.mp>0?m.mp/m.uc*100:0;
return 0;
};

}

// ========= SEARCH =========
let searchMatches=[];
let searchIdx=-1;

function searchRun(){
const q=document.getElementById('searchInput').value.trim();
const info=document.getElementById('searchInfo');
// Clear previous highlights
searchClearMarks();
searchMatches=[];
searchIdx=-1;
if(!q){info.textContent='';return}
// Find active panel
const panel=document.querySelector('.panel.active');
if(!panel)return;
// Walk text nodes inside the panel
const walker=document.createTreeWalker(panel,NodeFilter.SHOW_TEXT,null,false);
const nodes=[];
while(walker.nextNode()){
const n=walker.currentNode;
if(n.parentNode.tagName==='SCRIPT'||n.parentNode.tagName==='STYLE'||n.parentNode.tagName==='TEXTAREA'||n.parentNode.tagName==='INPUT')continue;
if(n.textContent.toLowerCase().includes(q.toLowerCase()))nodes.push(n);
}
// Wrap matches with <mark>
const re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
nodes.forEach(n=>{
const span=document.createElement('span');
span.innerHTML=n.textContent.replace(re,'<mark class="sh">$1</mark>');
n.parentNode.replaceChild(span,n);
});
searchMatches=panel.querySelectorAll('mark.sh');
info.textContent=searchMatches.length>0?'1/'+searchMatches.length:'0건';
if(searchMatches.length>0){searchIdx=0;searchHighlight()}
}

function searchClearMarks(){
document.querySelectorAll('mark.sh').forEach(m=>{
const parent=m.parentNode;
parent.replaceChild(document.createTextNode(m.textContent),m);
parent.normalize();
});
// Clean up wrapper spans (from previous search)
document.querySelectorAll('.panel span').forEach(sp=>{
if(sp.childNodes.length===1&&sp.childNodes[0].nodeType===3&&!sp.className&&!sp.id){
sp.parentNode.replaceChild(sp.childNodes[0],sp);
sp.parentNode?.normalize?.();
}
});
}

function searchHighlight(){
searchMatches.forEach((m,i)=>{m.classList.toggle('active',i===searchIdx)});
if(searchMatches[searchIdx]){
searchMatches[searchIdx].scrollIntoView({behavior:'smooth',block:'center',inline:'center'});
}
document.getElementById('searchInfo').textContent=(searchIdx+1)+'/'+searchMatches.length;
}

function searchNav(dir){
if(!searchMatches.length)return;
searchIdx=(searchIdx+dir+searchMatches.length)%searchMatches.length;
searchHighlight();
}

function searchClear(){
document.getElementById('searchInput').value='';
searchClearMarks();
searchMatches=[];searchIdx=-1;
document.getElementById('searchInfo').textContent='';
}

// Debounced input
let searchTimer=null;
document.addEventListener('DOMContentLoaded',()=>{
const si=document.getElementById('searchInput');
if(si){
si.addEventListener('input',()=>{clearTimeout(searchTimer);searchTimer=setTimeout(searchRun,300)});
si.addEventListener('keydown',e=>{
if(e.key==='Enter'){e.preventDefault();searchNav(e.shiftKey?-1:1)}
if(e.key==='Escape'){searchClear();si.blur()}
});
}
});
// Ctrl+F override
document.addEventListener('keydown',e=>{
if((e.ctrlKey||e.metaKey)&&e.key==='f'){
e.preventDefault();
const si=document.getElementById('searchInput');
if(si){si.focus();si.select()}
}
});
// Clear search on tab switch
const origAttachTabs_search=()=>{
document.querySelectorAll('.tab').forEach(t=>{
t.addEventListener('click',()=>{setTimeout(()=>{if(document.getElementById('searchInput').value)searchRun()},100)})
});
};
origAttachTabs_search();

// ========= ZOOM =========
let zoomLevel=100;
function applyZoom(){
document.querySelectorAll('.panel').forEach(p=>{p.style.transformOrigin='top left';p.style.transform='scale('+(zoomLevel/100)+')';p.style.width=(10000/zoomLevel)+'%'});
document.getElementById('zoomPct').textContent=zoomLevel+'%';
}
function zoomChange(delta){zoomLevel=Math.max(50,Math.min(200,zoomLevel+delta));applyZoom()}
function zoomReset(){zoomLevel=100;applyZoom()}
