name: 전체 Supabase 파이프라인

# 동일 실행 직렬화 (맥미니 트리거 + GitHub cron 중복 방지)
concurrency:
  group: supabase-pipeline
  cancel-in-progress: false

on:
  schedule:
    # 정각 회피 + 다중 백업 (맥미니가 :00 정각에 발사, 깃허브는 백업)
    - cron: '7 * * * *'      # 매시 7분 - 메인 백업
    - cron: '37 * * * *'     # 매시 37분 - 2차 백업
  workflow_dispatch:
    inputs:
      full_refresh:
        description: '전체 기간 갱신'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      refresh_days:
        description: '갱신 기간'
        required: false
        default: '10'
        type: choice
        options:
          - '7'
          - '10'
          - '30'
          - '60'
          - '180'
          - '365'

jobs:
  # ─── 국내 세트별 (먼저) ───
  kr-adset:
    name: 🇰🇷 국내 세트별
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pandas yfinance
      - name: Run 국내 세트별
        env:
          META_TOKEN_1: ${{ secrets.META_TOKEN_1 }}
          META_TOKEN_2: ${{ secrets.META_TOKEN_2 }}
          MIXPANEL_PROJECT_ID: ${{ secrets.MIXPANEL_PROJECT_ID }}
          MIXPANEL_USERNAME: ${{ secrets.MIXPANEL_USERNAME }}
          MIXPANEL_SECRET: ${{ secrets.MIXPANEL_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TOSS_SECRET_KEY: ${{ secrets.TOSS_SECRET_KEY }}
          FULL_REFRESH: ${{ github.event.inputs.full_refresh || 'false' }}
          REFRESH_DAYS: ${{ github.event.inputs.refresh_days || '10' }}
        run: python 국내_세트별_supabase.py

  # ─── 국내 소재별 (세트별 끝나면) ───
  kr-creative:
    name: 🎨 국내 소재별
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: kr-adset
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pandas
      - name: Run 국내 소재별
        env:
          META_TOKEN_1: ${{ secrets.META_TOKEN_1 }}
          META_TOKEN_2: ${{ secrets.META_TOKEN_2 }}
          MIXPANEL_PROJECT_ID: ${{ secrets.MIXPANEL_PROJECT_ID }}
          MIXPANEL_USERNAME: ${{ secrets.MIXPANEL_USERNAME }}
          MIXPANEL_SECRET: ${{ secrets.MIXPANEL_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FULL_REFRESH: ${{ github.event.inputs.full_refresh || 'false' }}
          REFRESH_DAYS: ${{ github.event.inputs.refresh_days || '10' }}
        run: python 국내_소재별_supabase.py

  # ─── 글로벌 (국내와 동시 실행) ───
  global:
    name: 🌏 글로벌 Meta+Stripe
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pandas yfinance stripe
      - name: Run 글로벌
        env:
          META_TOKEN_1: ${{ secrets.META_TOKEN_1 }}
          META_TOKEN_GlobalTT: ${{ secrets.META_TOKEN_GlobalTT }}
          META_TOKEN_4: ${{ secrets.META_TOKEN_4 }}
          META_TOKEN_3: ${{ secrets.META_TOKEN_3 }}
          MIXPANEL_PROJECT_ID: ${{ secrets.MIXPANEL_PROJECT_ID }}
          MIXPANEL_USERNAME: ${{ secrets.MIXPANEL_USERNAME }}
          MIXPANEL_SECRET: ${{ secrets.MIXPANEL_SECRET }}
          STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FULL_REFRESH: ${{ github.event.inputs.full_refresh || 'false' }}
          REFRESH_DAYS: ${{ github.event.inputs.refresh_days || '10' }}
        run: python 글로벌_세트별_supabase.py

  # ─── 글로벌 소재별 (글로벌 세트별 끝나면) ───
  global-creative:
    name: 🌏 글로벌 소재별
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: global
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pandas yfinance
      - name: Run 글로벌 소재별
        env:
          META_TOKEN_1: ${{ secrets.META_TOKEN_1 }}
          META_TOKEN_GlobalTT: ${{ secrets.META_TOKEN_GlobalTT }}
          META_TOKEN_4: ${{ secrets.META_TOKEN_4 }}
          META_TOKEN_3: ${{ secrets.META_TOKEN_3 }}
          MIXPANEL_PROJECT_ID: ${{ secrets.MIXPANEL_PROJECT_ID }}
          MIXPANEL_USERNAME: ${{ secrets.MIXPANEL_USERNAME }}
          MIXPANEL_SECRET: ${{ secrets.MIXPANEL_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FULL_REFRESH: ${{ github.event.inputs.full_refresh || 'false' }}
          REFRESH_DAYS: ${{ github.event.inputs.refresh_days || '10' }}
        run: python 글로벌_소재별_supabase.py

  # ─── 밴스드 세트별 (독립 실행) ───
  vn-adset:
    name: 🎯 밴스드 세트별
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pandas
      - name: Run 밴스드 세트별
        env:
          META_TOKEN_VANCED: ${{ secrets.META_TOKEN_VANCED }}
          MIXPANEL_PROJECT_ID: ${{ secrets.MIXPANEL_PROJECT_ID }}
          MIXPANEL_USERNAME: ${{ secrets.MIXPANEL_USERNAME }}
          MIXPANEL_SECRET: ${{ secrets.MIXPANEL_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FULL_REFRESH: ${{ github.event.inputs.full_refresh || 'false' }}
          REFRESH_DAYS: ${{ github.event.inputs.refresh_days || '10' }}
        run: python 밴스드_세트별_supabase.py

  # ─── 밴스드 소재별 (세트별 끝나면) ───
  vn-creative:
    name: 🎨 밴스드 소재별
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: vn-adset
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pandas
      - name: Run 밴스드 소재별
        env:
          META_TOKEN_VANCED: ${{ secrets.META_TOKEN_VANCED }}
          MIXPANEL_PROJECT_ID: ${{ secrets.MIXPANEL_PROJECT_ID }}
          MIXPANEL_USERNAME: ${{ secrets.MIXPANEL_USERNAME }}
          MIXPANEL_SECRET: ${{ secrets.MIXPANEL_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FULL_REFRESH: ${{ github.event.inputs.full_refresh || 'false' }}
          REFRESH_DAYS: ${{ github.event.inputs.refresh_days || '10' }}
        run: python 밴스드_소재별_supabase.py

  # ─── 네이버 검색광고 (독립 실행) ───
  naver-sa:
    name: 🔍 네이버 SA
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Run 네이버SA
        env:
          NAVER_API_KEY: ${{ secrets.NAVER_API_KEY }}
          NAVER_SECRET_KEY: ${{ secrets.NAVER_SECRET_KEY }}
          NAVER_CUSTOMER_ID: ${{ secrets.NAVER_CUSTOMER_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FULL_REFRESH: ${{ github.event.inputs.full_refresh || 'false' }}
          REFRESH_DAYS: ${{ github.event.inputs.refresh_days || '10' }}
        run: python 네이버_supabase.py

  # ─── 구글 Ads (시트 → Supabase) ───
  google-ads:
    name: 🔎 구글 Ads (시트)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install gspread google-auth requests
      - name: Run 구글Ads
        env:
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FULL_REFRESH: ${{ github.event.inputs.full_refresh || 'false' }}
          REFRESH_DAYS: ${{ github.event.inputs.refresh_days || '10' }}
        run: python 구글_supabase.py

  # ─── Toss Payments (독립 실행) ───
  toss:
    name: 💳 Toss Payments
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Run Toss
        env:
          TOSS_SECRET_KEY: ${{ secrets.TOSS_SECRET_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FULL_REFRESH: ${{ github.event.inputs.full_refresh || 'false' }}
          REFRESH_DAYS: ${{ github.event.inputs.refresh_days || '10' }}
        run: python 토스_supabase.py

  # ─── 네이버 Mixpanel 매출 (독립 실행) ───
  naver-mp:
    name: 📊 네이버 Mixpanel 매출
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Run Naver Mixpanel
        env:
          MIXPANEL_PROJECT_ID: ${{ secrets.MIXPANEL_PROJECT_ID }}
          MIXPANEL_USERNAME: ${{ secrets.MIXPANEL_USERNAME }}
          MIXPANEL_SECRET: ${{ secrets.MIXPANEL_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FULL_REFRESH: ${{ github.event.inputs.full_refresh || 'false' }}
          REFRESH_DAYS: ${{ github.event.inputs.refresh_days || '10' }}
        run: python 네이버_mp_supabase.py

  # ─── 구글 디멘드젠 Mixpanel 콘텐츠별 매출 (ch=google, 독립 실행) ───
  google-dg-mp:
    name: 🟢 구글 디멘드젠 Mixpanel
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Run 구글 디멘드젠 Mixpanel
        env:
          MIXPANEL_PROJECT_ID: ${{ secrets.MIXPANEL_PROJECT_ID }}
          MIXPANEL_USERNAME: ${{ secrets.MIXPANEL_USERNAME }}
          MIXPANEL_SECRET: ${{ secrets.MIXPANEL_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FULL_REFRESH: ${{ github.event.inputs.full_refresh || 'false' }}
          REFRESH_DAYS: ${{ github.event.inputs.refresh_days || '10' }}
        run: python 구글_디멘드젠_mp_supabase.py

  # ─── 구글 디멘드젠 콘텐츠별 지출 (구글 Ads API, 독립 실행) ───
  google-dg-spend:
    name: 🟢 구글 디멘드젠 지출(Ads API)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install google-ads requests
      - name: Run 구글 디멘드젠 지출
        env:
          G_ADS_DEV_TOKEN: ${{ secrets.G_ADS_DEV_TOKEN }}
          G_ADS_CLIENT_ID: ${{ secrets.G_ADS_CLIENT_ID }}
          G_ADS_CLIENT_SECRET: ${{ secrets.G_ADS_CLIENT_SECRET }}
          G_ADS_REFRESH_TOKEN: ${{ secrets.G_ADS_REFRESH_TOKEN }}
          G_ADS_LOGIN_ID: ${{ secrets.G_ADS_LOGIN_ID }}
          G_ADS_CUSTOMER_ID: ${{ secrets.G_ADS_CUSTOMER_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FULL_REFRESH: ${{ github.event.inputs.full_refresh || 'false' }}
          REFRESH_DAYS: ${{ github.event.inputs.refresh_days || '10' }}
        run: python 구글_디멘드젠_api_supabase.py

  # ─── 구글 디멘드젠 [Tight] 캠페인별 (지출 Ads API + 매출 Mixpanel utm_campaign, 독립 실행) ───
  google-dg-tight:
    name: 🟢 구글 디멘드젠 [Tight] 캠페인
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install google-ads requests
      - name: Run 구글 디멘드젠 [Tight] 캠페인
        env:
          G_ADS_DEV_TOKEN: ${{ secrets.G_ADS_DEV_TOKEN }}
          G_ADS_CLIENT_ID: ${{ secrets.G_ADS_CLIENT_ID }}
          G_ADS_CLIENT_SECRET: ${{ secrets.G_ADS_CLIENT_SECRET }}
          G_ADS_REFRESH_TOKEN: ${{ secrets.G_ADS_REFRESH_TOKEN }}
          G_ADS_LOGIN_ID: ${{ secrets.G_ADS_LOGIN_ID }}
          G_ADS_CUSTOMER_ID: ${{ secrets.G_ADS_CUSTOMER_ID }}
          MIXPANEL_PROJECT_ID: ${{ secrets.MIXPANEL_PROJECT_ID }}
          MIXPANEL_USERNAME: ${{ secrets.MIXPANEL_USERNAME }}
          MIXPANEL_SECRET: ${{ secrets.MIXPANEL_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FULL_REFRESH: ${{ github.event.inputs.full_refresh || 'false' }}
          REFRESH_DAYS: ${{ github.event.inputs.refresh_days || '10' }}
        run: python 구글_디멘드젠_캠페인_supabase.py

  # ─── 지표 하이아라키 KPI (국내 세트별 + Toss 끝나면 집계) ───
  kpi:
    name: 📈 지표 KPI
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [kr-adset, toss]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run KPI 집계
        env:
          MIXPANEL_PROJECT_ID: ${{ secrets.MIXPANEL_PROJECT_ID }}
          MIXPANEL_USERNAME: ${{ secrets.MIXPANEL_USERNAME }}
          MIXPANEL_SECRET: ${{ secrets.MIXPANEL_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PRODUCT_SB_KEY: ${{ secrets.PRODUCT_SB_KEY }}
        run: python kpi_supabase.py

  # ─── 슬랙 알람 (국내 데이터 갱신 후 조건 검사) ───
  alert:
    name: 🔔 슬랙 알람
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [kr-adset]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run 알람 검사
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python kpi_slack_alert.py
