name: Meta+Mixpanel → Supabase

on:
  schedule:
    # KST 오전 9시 (UTC 0시)
    - cron: '0 0 * * *'
    # KST 오후 6시 (UTC 9시)
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      full_refresh:
        description: '전체 기간 갱신 (2026-01-01~오늘)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      refresh_days:
        description: '갱신 일수 (기본 10)'
        required: false
        default: '10'

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas yfinance

      - name: Run pipeline
        env:
          META_TOKEN_KR_A: ${{ secrets.META_TOKEN_KR_A }}
          META_TOKEN_KR_B: ${{ secrets.META_TOKEN_KR_B }}
          MIXPANEL_PROJECT_ID: ${{ secrets.MIXPANEL_PROJECT_ID }}
          MIXPANEL_USERNAME: ${{ secrets.MIXPANEL_USERNAME }}
          MIXPANEL_SECRET: ${{ secrets.MIXPANEL_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          FULL_REFRESH: ${{ github.event.inputs.full_refresh || 'false' }}
          REFRESH_DAYS: ${{ github.event.inputs.refresh_days || '10' }}
        run: python 국내_세트별_supabase.py
