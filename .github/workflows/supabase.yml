name: 전체 Supabase 파이프라인
on:
  schedule:
    - cron: '0 15 * * *'    # KST 00:00
    - cron: '0 21 * * *'    # KST 06:00
    - cron: '0 9 * * *'     # KST 18:00
  workflow_dispatch:
    inputs:
      full_refresh:
        description: '전체 기간 갱신'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      refresh_days:
        description: '갱신 기간'
        required: false
        default: '10'
        type: choice
        options:
          - '7'
          - '10'
          - '30'
          - '180'
          - '365'

jobs:
  # ─── 국내 세트별 (먼저) ───
  kr-adset:
    name: 🇰🇷 국내 세트별
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pandas yfinance
      - name: Run 국내 세트별
        env:
          META_TOKEN_1: ${{ secrets.META_TOKEN_1 }}
          META_TOKEN_2: ${{ secrets.META_TOKEN_2 }}
          MIXPANEL_PROJECT_ID: ${{ secrets.MIXPANEL_PROJECT_ID }}
          MIXPANEL_USERNAME: ${{ secrets.MIXPANEL_USERNAME }}
          MIXPANEL_SECRET: ${{ secrets.MIXPANEL_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TOSS_SECRET_KEY: ${{ secrets.TOSS_SECRET_KEY }}
          FULL_REFRESH: ${{ github.event.inputs.full_refresh || 'false' }}
          REFRESH_DAYS: ${{ github.event.inputs.refresh_days || '10' }}
        run: python 국내_세트별_supabase.py

  # ─── 국내 소재별 (세트별 끝나면) ───
  kr-creative:
    name: 🎨 국내 소재별
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: kr-adset
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pandas
      - name: Run 국내 소재별
        env:
          META_TOKEN_1: ${{ secrets.META_TOKEN_1 }}
          META_TOKEN_2: ${{ secrets.META_TOKEN_2 }}
          MIXPANEL_PROJECT_ID: ${{ secrets.MIXPANEL_PROJECT_ID }}
          MIXPANEL_USERNAME: ${{ secrets.MIXPANEL_USERNAME }}
          MIXPANEL_SECRET: ${{ secrets.MIXPANEL_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FULL_REFRESH: ${{ github.event.inputs.full_refresh || 'false' }}
          REFRESH_DAYS: ${{ github.event.inputs.refresh_days || '10' }}
        run: python 국내_소재별_supabase.py

  # ─── 글로벌 (국내와 동시 실행) ───
  global:
    name: 🌏 글로벌 Meta+Stripe
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pandas yfinance stripe
      - name: Run 글로벌
        env:
          META_TOKEN_1: ${{ secrets.META_TOKEN_1 }}
          META_TOKEN_GlobalTT: ${{ secrets.META_TOKEN_GlobalTT }}
          META_TOKEN_4: ${{ secrets.META_TOKEN_4 }}
          META_TOKEN_3: ${{ secrets.META_TOKEN_3 }}
          MIXPANEL_PROJECT_ID: ${{ secrets.MIXPANEL_PROJECT_ID }}
          MIXPANEL_USERNAME: ${{ secrets.MIXPANEL_USERNAME }}
          MIXPANEL_SECRET: ${{ secrets.MIXPANEL_SECRET }}
          STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FULL_REFRESH: ${{ github.event.inputs.full_refresh || 'false' }}
          REFRESH_DAYS: ${{ github.event.inputs.refresh_days || '10' }}
        run: python 글로벌_세트별_supabase.py

  # ─── 밴스드 세트별 (독립 실행) ───
  vn-adset:
    name: 🎯 밴스드 세트별
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pandas
      - name: Run 밴스드 세트별
        env:
          META_TOKEN_VANCED: ${{ secrets.META_TOKEN_VANCED }}
          MIXPANEL_PROJECT_ID: ${{ secrets.MIXPANEL_PROJECT_ID }}
          MIXPANEL_USERNAME: ${{ secrets.MIXPANEL_USERNAME }}
          MIXPANEL_SECRET: ${{ secrets.MIXPANEL_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FULL_REFRESH: ${{ github.event.inputs.full_refresh || 'false' }}
          REFRESH_DAYS: ${{ github.event.inputs.refresh_days || '10' }}
        run: python 밴스드_세트별_supabase.py

  # ─── 밴스드 소재별 (세트별 끝나면) ───
  vn-creative:
    name: 🎨 밴스드 소재별
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: vn-adset
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pandas
      - name: Run 밴스드 소재별
        env:
          META_TOKEN_VANCED: ${{ secrets.META_TOKEN_VANCED }}
          MIXPANEL_PROJECT_ID: ${{ secrets.MIXPANEL_PROJECT_ID }}
          MIXPANEL_USERNAME: ${{ secrets.MIXPANEL_USERNAME }}
          MIXPANEL_SECRET: ${{ secrets.MIXPANEL_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FULL_REFRESH: ${{ github.event.inputs.full_refresh || 'false' }}
          REFRESH_DAYS: ${{ github.event.inputs.refresh_days || '10' }}
        run: python 밴스드_소재별_supabase.py

  # ─── 네이버 검색광고 (독립 실행) ───
  naver-sa:
    name: 🔍 네이버 SA
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Run 네이버SA
        env:
          NAVER_API_KEY: ${{ secrets.NAVER_API_KEY }}
          NAVER_SECRET_KEY: ${{ secrets.NAVER_SECRET_KEY }}
          NAVER_CUSTOMER_ID: ${{ secrets.NAVER_CUSTOMER_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FULL_REFRESH: ${{ github.event.inputs.full_refresh || 'false' }}
          REFRESH_DAYS: ${{ github.event.inputs.refresh_days || '10' }}
        run: python 네이버_supabase.py

  # ─── 구글 Ads (시트 → Supabase) ───
  google-ads:
    name: 🔎 구글 Ads (시트)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install gspread google-auth requests
      - name: Run 구글Ads
        env:
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FULL_REFRESH: ${{ github.event.inputs.full_refresh || 'false' }}
          REFRESH_DAYS: ${{ github.event.inputs.refresh_days || '10' }}
        run: python 구글_supabase.py
