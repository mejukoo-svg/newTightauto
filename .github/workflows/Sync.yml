name: 글로벌 매출 동기화

on:
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install stripe gspread google-auth requests

      - name: Setup service account
        run: echo '${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}' > service_account.json

      - name: Run 글로벌_매출
        env:
          STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
          SPREADSHEET_URL_TW_ADSET: ${{ secrets.SPREADSHEET_URL_TW_ADSET }}
          GCP_SERVICE_ACCOUNT_KEY: service_account.json
        run: python 글로벌_매출.py all
