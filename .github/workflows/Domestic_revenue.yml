name: 매출 대시보드 자동화

on:
  schedule:
    - cron: '0 21 * * *'  # KST 06:00 (매일 오전 6시)
  workflow_dispatch:

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install gspread google-auth requests

      - name: Debug - check token prefixes
        env:
          META3RD_TOKEN: ${{ secrets.META3RD_TOKEN }}
          VANCED_TOKEN: ${{ secrets.VANCED_TOKEN }}
        run: |
          echo "META3RD_TOKEN starts with: ${META3RD_TOKEN:0:10}"
          echo "VANCED_TOKEN starts with: ${VANCED_TOKEN:0:10}"

      - name: Run dashboard script
        env:
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          META_TOKEN_1: ${{ secrets.META_TOKEN_1 }}
          META3RD_TOKEN: ${{ secrets.META3RD_TOKEN }}
          VANCED_TOKEN: ${{ secrets.VANCED_TOKEN }}
          TOSS_SECRET_KEY: ${{ secrets.TOSS_SECRET_KEY }}
        run: python 국내_매출.py
