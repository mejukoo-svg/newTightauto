name: 매출 대시보드 자동화

on:
  schedule:
    - cron: '0 21 * * *'  # KST 06:00 (매일 오전 6시)
  workflow_dispatch:

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install gspread google-auth requests

      - name: Run dashboard script
        env:
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          META_TOKEN_1: ${{ secrets.META_TOKEN_1 }}
          META_TOKEN_2: ${{ secrets.META_TOKEN_2 }}
          META_TOKEN_3: ${{ secrets.META_TOKEN_3 }}
          META_TOKEN_4: ${{ secrets.META_TOKEN_4 }}
          TOSS_SECRET_KEY: ${{ secrets.TOSS_SECRET_KEY }}
        run: python 국내_매출.py
