name: Meta Ads Report

on:
  schedule:
    - cron: '0 15 * * *'   # KST 00:00
    - cron: '0 21 * * *'    # KST 06:00
    - cron: '0 12 * * *'    # KST 21:00
  workflow_dispatch:
    inputs:
      script:
        description: '실행할 스크립트 선택'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - global_adset
          - global_revenue
          - domestic_adset
          - domestic_creative
          - vanced_adset
          - vanced_creative

# ★ v30b: 전역 환경변수 — 실시간 로그 출력 + 타임아웃 방지
env:
  PYTHONUNBUFFERED: "1"

jobs:
  global_adset:
    name: 글로벌_세트별
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.script == 'all' ||
      github.event.inputs.script == 'global_adset'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install gspread google-auth pandas requests yfinance
      - run: python 글로벌_세트별.py
        env:
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          META_TOKEN_1: ${{ secrets.META_TOKEN_1 }}
          META_TOKEN_2: ${{ secrets.META_TOKEN_2 }}
          META_TOKEN_3: ${{ secrets.META_TOKEN_3 }}
          META_TOKEN_4: ${{ secrets.META_TOKEN_4 }}
          META_TOKEN_GlobalTT: ${{ secrets.META_TOKEN_GlobalTT }}
          MIXPANEL_USERNAME: ${{ secrets.MIXPANEL_USERNAME }}
          MIXPANEL_SECRET: ${{ secrets.MIXPANEL_SECRET }}
          MIXPANEL_PROJECT_ID: ${{ secrets.MIXPANEL_PROJECT_ID }}
          SPREADSHEET_URL: ${{ secrets.SPREADSHEET_URL_TW_ADSET }}

  global_revenue:
    name: 글로벌_매출
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.script == 'all' ||
      github.event.inputs.script == 'global_revenue'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install gspread google-auth pandas requests stripe
      - run: python 글로벌_매출.py all
        env:
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
          SPREADSHEET_URL_TW_ADSET: ${{ secrets.SPREADSHEET_URL_TW_ADSET }}

  domestic_adset:
    name: 국내_세트별
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.script == 'all' ||
      github.event.inputs.script == 'domestic_adset'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install gspread google-auth pandas requests yfinance
      - run: python 국내_세트별.py
        env:
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          META_TOKEN_1: ${{ secrets.META_TOKEN_1 }}
          META_TOKEN_2: ${{ secrets.META_TOKEN_2 }}
          META_TOKEN_3: ${{ secrets.META_TOKEN_3 }}
          META_TOKEN_4: ${{ secrets.META_TOKEN_4 }}
          MIXPANEL_USERNAME: ${{ secrets.MIXPANEL_USERNAME }}
          MIXPANEL_SECRET: ${{ secrets.MIXPANEL_SECRET }}
          MIXPANEL_PROJECT_ID: ${{ secrets.MIXPANEL_PROJECT_ID }}
          SPREADSHEET_URL: ${{ secrets.SPREADSHEET_URL_KR_ADSET }}

  domestic_creative:
    name: 국내_소재별
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.script == 'all' ||
      github.event.inputs.script == 'domestic_creative'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install gspread google-auth pandas requests yfinance
      - run: python 국내_소재별.py
        env:
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          META_TOKEN_1: ${{ secrets.META_TOKEN_1 }}
          META_TOKEN_2: ${{ secrets.META_TOKEN_2 }}
          META_TOKEN_3: ${{ secrets.META_TOKEN_3 }}
          META_TOKEN_4: ${{ secrets.META_TOKEN_4 }}
          MIXPANEL_USERNAME: ${{ secrets.MIXPANEL_USERNAME }}
          MIXPANEL_SECRET: ${{ secrets.MIXPANEL_SECRET }}
          MIXPANEL_PROJECT_ID: ${{ secrets.MIXPANEL_PROJECT_ID }}
          SPREADSHEET_URL: ${{ secrets.SPREADSHEET_URL_KR_CREATIVE }}

  vanced_adset:
    name: vanced_세트별
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.script == 'all' ||
      github.event.inputs.script == 'vanced_adset'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install gspread google-auth pandas requests yfinance
      - run: python vanced_세트별.py
        env:
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          META_TOKEN_1: ${{ secrets.META_TOKEN_1 }}
          META_TOKEN_2: ${{ secrets.META_TOKEN_2 }}
          META_TOKEN_3: ${{ secrets.META_TOKEN_3 }}
          META_TOKEN_4: ${{ secrets.META_TOKEN_4 }}
          META_TOKEN_VANCED: ${{ secrets.META_TOKEN_VANCED }}
          MIXPANEL_USERNAME: ${{ secrets.MIXPANEL_USERNAME }}
          MIXPANEL_SECRET: ${{ secrets.MIXPANEL_SECRET }}
          MIXPANEL_PROJECT_ID: ${{ secrets.MIXPANEL_PROJECT_ID }}
          SPREADSHEET_URL: ${{ secrets.SPREADSHEET_URL_VANCED }}

  vanced_creative:
    name: vanced_소재별
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.script == 'all' ||
      github.event.inputs.script == 'vanced_creative'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install gspread google-auth pandas requests yfinance
      - run: python vanced_소재별.py
        env:
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          META_TOKEN_1: ${{ secrets.META_TOKEN_1 }}
          META_TOKEN_2: ${{ secrets.META_TOKEN_2 }}
          META_TOKEN_3: ${{ secrets.META_TOKEN_3 }}
          META_TOKEN_4: ${{ secrets.META_TOKEN_4 }}
          META_TOKEN_VANCED: ${{ secrets.META_TOKEN_VANCED }}
          MIXPANEL_USERNAME: ${{ secrets.MIXPANEL_USERNAME }}
          MIXPANEL_SECRET: ${{ secrets.MIXPANEL_SECRET }}
          MIXPANEL_PROJECT_ID: ${{ secrets.MIXPANEL_PROJECT_ID }}
          SPREADSHEET_URL: ${{ secrets.SPREADSHEET_URL_VANCED_creative }}
