name: 오늘의퍼포먼스봇

# 매일 오전 10시 10분(KST) 국내·글로벌 퍼포먼스 표 + 플레이북 조언을 Slack 채널에 게시
on:
  schedule:
    - cron: '10 1 * * *'   # 01:10 UTC = 10:10 KST. 오프아워 분(:10)+비혼잡대(01시)로 GitHub cron 드롭 완화
  workflow_dispatch:        # 수동 실행 버튼

concurrency:
  group: dashboard-bot
  cancel-in-progress: false

jobs:
  post:
    name: 퍼포먼스봇 게시
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install anthropic
      - name: Run dashboard_bot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CH_KR_MARKETING: ${{ secrets.SLACK_CH_KR_MARKETING }}
          SLACK_CH_GL_MARKETING: ${{ secrets.SLACK_CH_GL_MARKETING }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python dashboard_bot.py
