name: 글로벌 소재별 Meta → Supabase

on:
  schedule:
    # 매시 40분 실행. UTC 0-17 = KST 09:40~익일 02:40 (국내와 동일하게 시간당 1회, 하루 18회)
    # 분은 :40으로 둬서 국내(:00)·세트별(:30)과 겹치지 않게 stagger
    - cron: '40 0-17 * * *'
  workflow_dispatch:
    inputs:
      full_refresh:
        description: '전체 기간 갱신 (2025-12-01~오늘)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      refresh_days:
        description: '갱신 기간'
        required: false
        default: '10'
        type: choice
        options:
          - '7'
          - '10'
          - '30'
          - '60'
          - '180'
          - '365'

jobs:
  sync:
    runs-on: ubuntu-latest
    # FULL_REFRESH(211일) 백필이 60분 초과로 upsert 전 타임아웃되는 것 방지. 평시 cron(10일)은 ~7분.
    timeout-minutes: 330

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        # stripe 필수 — 건별 실제통화 환산(Stripe (amount,시각) 매칭)에 사용. 없으면 통화 인덱스 미구축 → 옛 country 보정으로 폴백.
        run: pip install requests pandas yfinance stripe

      - name: Run pipeline
        env:
          META_TOKEN_1: ${{ secrets.META_TOKEN_1 }}
          META_TOKEN_GlobalTT: ${{ secrets.META_TOKEN_GlobalTT }}
          META_TOKEN_4: ${{ secrets.META_TOKEN_4 }}
          META_TOKEN_3: ${{ secrets.META_TOKEN_3 }}
          META_TOKEN_ACT_9937: ${{ secrets.META_TOKEN_ACT_9937 }}
          MIXPANEL_PROJECT_ID: ${{ secrets.MIXPANEL_PROJECT_ID }}
          MIXPANEL_USERNAME: ${{ secrets.MIXPANEL_USERNAME }}
          MIXPANEL_SECRET: ${{ secrets.MIXPANEL_SECRET }}
          STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_DB_SCHEMA: ${{ secrets.SUPABASE_DB_SCHEMA }}
          FULL_REFRESH: ${{ github.event.inputs.full_refresh || 'false' }}
          REFRESH_DAYS: ${{ github.event.inputs.refresh_days || '10' }}
        run: python 글로벌_소재별_supabase.py
